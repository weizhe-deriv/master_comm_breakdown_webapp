function buildIndexes(data){
  const pi={},po={},sp={};
  const mids=new Set(data.map(m=>m.partner_member_id));
  data.forEach(m=>{m.commission_details.forEach(d=>{
    if(!pi[d.partner_paid_id])pi[d.partner_paid_id]=[];
    pi[d.partner_paid_id].push({memberId:m.partner_member_id,detail:d});
    if(!po[d.payout_id])po[d.payout_id]=[];
    po[d.payout_id].push({memberId:m.partner_member_id,detail:d});
    if(!sp[d.source_partner_id])sp[d.source_partner_id]=[];
    sp[d.source_partner_id].push({memberId:m.partner_member_id,detail:d});
  })});
  return{paidIndex:pi,payoutIndex:po,srcPartnerIndex:sp,memberIds:mids};
}

function csvToJson(csvText){
  const lines=csvText.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)throw new Error("CSV needs a header row and at least one data row.");
  const parseRow=(line)=>{
    const fields=[];let cur="",inQ=false,i=0;
    while(i<line.length){const ch=line[i];
      if(inQ){if(ch==='"'&&i+1<line.length&&line[i+1]==='"'){cur+='"';i+=2}else if(ch==='"'){inQ=false;i++}else{cur+=ch;i++}}
      else{if(ch==='"'){inQ=true;i++}else if(ch===','){fields.push(cur);cur="";i++}else{cur+=ch;i++}}
    }fields.push(cur);return fields;
  };
  const hdr=parseRow(lines[0]).map(h=>h.trim());
  const hasCD=hdr.includes("commission_details");
  const hasFlat=["partner_paid_id","payout_id","source_partner_id","source_amount_in_usd","commission_amount_in_usd","level"].every(c=>hdr.includes(c));
  if(!hasCD&&!hasFlat)throw new Error("CSV must have either a 'commission_details' JSON column, or flat columns: partner_paid_id, payout_id, date, source_partner_id, source_amount_in_usd, commission_amount_in_usd, level");
  const idx={};hdr.forEach((h,i)=>idx[h]=i);
  if(hasCD){
    return lines.slice(1).map(line=>{
      const vals=parseRow(line);
      const get=k=>(idx[k]!==undefined&&vals[idx[k]]!==undefined)?vals[idx[k]].trim():"";
      const mid=parseInt(get("partner_member_id"));if(isNaN(mid))return null;
      let details=[];const raw=get("commission_details").trim();
      if(raw){try{details=JSON.parse(raw);if(!Array.isArray(details))details=[details]}catch(e){try{let c=raw.replace(/""/g,'"');if(!c.startsWith("["))c="["+c+"]";details=JSON.parse(c)}catch(e2){details=[]}}}
      const totalComm=get("total_commission_in_usd");
      const cc=details.reduce((s,d)=>s+(parseFloat(d.commission_amount_in_usd)||0),0);
      return{partner_member_id:mid,partner_brand_user_id:get("partner_brand_user_id")||String(mid),partner_brand:get("partner_brand")||"v1",source_user_residence:(get("source_user_residence")||"").toLowerCase(),total_commission_in_usd:totalComm||cc.toFixed(2),distinct_paid_count:parseInt(get("distinct_paid_count"))||new Set(details.map(d=>d.partner_paid_id)).size,commission_details:details.map(d=>({partner_paid_id:parseInt(d.partner_paid_id)||0,payout_id:parseInt(d.payout_id)||0,date:d.date||"",source_partner_id:parseInt(d.source_partner_id)||0,source_amount_in_usd:parseFloat(d.source_amount_in_usd)||0,commission_amount_in_usd:parseFloat(d.commission_amount_in_usd)||0,level:parseInt(d.level)||1}))};
    }).filter(Boolean).sort((a,b)=>parseFloat(b.total_commission_in_usd)-parseFloat(a.total_commission_in_usd));
  }else{
    const members={};
    for(let i=1;i<lines.length;i++){const vals=parseRow(lines[i]);const get=k=>(idx[k]!==undefined&&vals[idx[k]]!==undefined)?vals[idx[k]].trim():"";
      const mid=parseInt(get("partner_member_id"));if(isNaN(mid))continue;
      if(!members[mid])members[mid]={partner_member_id:mid,partner_brand_user_id:get("partner_brand_user_id")||String(mid),source_user_residence:(get("source_user_residence")||"").toLowerCase(),total_commission_in_usd:"0",distinct_paid_count:0,commission_details:[]};
      members[mid].commission_details.push({partner_paid_id:parseInt(get("partner_paid_id"))||0,payout_id:parseInt(get("payout_id"))||0,date:get("date")||"",source_partner_id:parseInt(get("source_partner_id"))||0,source_amount_in_usd:parseFloat(get("source_amount_in_usd"))||0,commission_amount_in_usd:parseFloat(get("commission_amount_in_usd"))||0,level:parseInt(get("level"))||1});
    }
    return Object.values(members).map(m=>{m.total_commission_in_usd=m.commission_details.reduce((s,d)=>s+d.commission_amount_in_usd,0).toFixed(2);m.distinct_paid_count=new Set(m.commission_details.map(d=>d.partner_paid_id)).size;return m}).sort((a,b)=>parseFloat(b.total_commission_in_usd)-parseFloat(a.total_commission_in_usd));
  }
}
